<!DOCTYPE html>
    <html lang="pt-BR">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Chute um número</title>
            <link rel="stylesheet" href="style.css">
            <script src="script.js" defer></script>
        </head>
        <body>
            <h1>Chute um número</h1>
            <div id="gamePanel">
                <p> vamos jogar um jogo. Você terá 10 tentativas para adivinhar um número entre 1 a 100</p>

                <p id="numeroMaiorOuMenor"></p>
                <p id="tentativas">número de tentaivas: 10</p>

                <label for="numeroEscolha">escolha um número</label>
                <input type="number" id="numeroEscolha">

                <button onclick="adivinharNumero()" id="botaoAdivinhar">adivinhar</button>
            </div>
            <div id="endGame">
                <h2 id="resultTitle">Derrota</h2>
                <p id="resultText">Você perdeu, clique no botão para reiniciar o jogo.</p>
                <p id="resultNumber"></p>
                <button id="restart">reiniciar</button>
            </div>
        </body>
    </html>
